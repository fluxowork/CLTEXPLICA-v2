<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste Anúncios</title>
  <style>
    body { font-family: sans-serif; padding: 16px; background: #f5f5f5; }
    .slot { border: 2px dashed #ccc; padding: 16px; margin: 16px 0; min-height: 80px; background: #fff; border-radius: 8px; }
    .slot.ativo { border-color: #2ecc71; }
    h3 { color: #333; margin: 0 0 8px; font-size: 13px; color: #999; }
    #log { background: #111; color: #0f0; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>

<div id="log">Carregando...</div>

<h2>Slot: banner-topo</h2>
<div class="slot" data-ad-slot="banner-topo"><h3>vazio</h3></div>

<h2>Slot: meio-artigo</h2>
<div class="slot" data-ad-slot="meio-artigo"><h3>vazio</h3></div>

<h2>Slot: rodape</h2>
<div class="slot" data-ad-slot="rodape"><h3>vazio</h3></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script>
const log = document.getElementById('log')

async function testar() {
  log.innerHTML = 'Buscando anúncios...\n'

  const { data, error } = await sb.from('ads').select('*').eq('status', 'active')

  if (error) {
    log.innerHTML += '❌ ERRO: ' + error.message
    return
  }

  log.innerHTML += `✅ ${data.length} anúncio(s) encontrado(s)\n`

  data.forEach(ad => {
    log.innerHTML += `\n📢 ${ad.ad_id} → posição: ${ad.position}\n`

    const slots = document.querySelectorAll(`[data-ad-slot="${ad.position}"]`)
    log.innerHTML += `   Slots no DOM: ${slots.length}\n`

    const img = ad.image_base64 || ad.image_url
    const html = ad.type === 'code'
      ? ad.html_code
      : img
        ? `<a href="${ad.link||'#'}" target="_blank"><img src="${img}" style="width:100%;height:auto;display:block;border-radius:8px;" onerror="this.src='';this.alt='Erro ao carregar imagem'"></a>`
        : null

    if (!html) {
      log.innerHTML += `   ⚠️ Sem conteúdo (sem imagem e sem código HTML)\n`
      return
    }

    slots.forEach(slot => {
      slot.innerHTML = html
      slot.classList.add('ativo')
    })

    log.innerHTML += `   ✅ Renderizado!\n`
  })
}

testar()
</script>
</body>
</html>
