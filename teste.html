<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnóstico Anúncios</title>
  <style>
    body { font-family: monospace; padding: 16px; background: #111; color: #0f0; font-size: 13px; }
    .ok { color: #0f0; } .erro { color: #f44; } .info { color: #ff0; }
    h2 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; margin-top: 24px; }
  </style>
</head>
<body>
<h2>🔍 Diagnóstico Anúncios</h2>
<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script>
const log = document.getElementById('log')
function out(msg, tipo='info') { log.innerHTML += `<div class="${tipo}">${msg}</div>` }

async function diagnostico() {
  // 1. Todos os anúncios
  out('<h2>Todos os anúncios no banco</h2>')
  const { data: todos, error: e1 } = await sb.from('ads').select('*')
  if (e1) { out('❌ Erro: ' + e1.message, 'erro'); }
  else if (!todos || todos.length === 0) { out('⚠️ Nenhum anúncio cadastrado ainda', 'erro') }
  else {
    out(`✅ ${todos.length} anúncio(s) no banco`, 'ok')
    todos.forEach(ad => {
      out(`   📢 ID: ${ad.ad_id} | Status: ${ad.status} | Posição: ${ad.position} | Tipo: ${ad.type}`, 
          ad.status === 'active' ? 'ok' : 'info')
    })
  }

  // 2. Só ativos
  out('<h2>Anúncios ativos (o que aparece no site)</h2>')
  const { data: ativos, error: e2 } = await sb.from('ads').select('*').eq('status','active')
  if (e2) { out('❌ Erro RLS: ' + e2.message, 'erro'); out('⚠️ Provavelmente falta policy de leitura pública na tabela ads', 'erro') }
  else if (!ativos || ativos.length === 0) { out('⚠️ Nenhum anúncio com status "active"', 'erro') }
  else {
    out(`✅ ${ativos.length} anúncio(s) ativo(s)`, 'ok')
    ativos.forEach(ad => {
      const temConteudo = ad.image_base64 || ad.image_url || ad.html_code
      out(`   ✅ ${ad.ad_id} → posição: ${ad.position} | tem conteúdo: ${temConteudo ? 'SIM' : 'NÃO'}`,
          temConteudo ? 'ok' : 'erro')
    })
  }

  // 3. Slots no DOM (não existe neste arquivo de teste, mas informa)
  out('<h2>Slots no site</h2>')
  out('Slots esperados: banner-topo, meio-artigo, rodape', 'info')
  out('Para ver se aparecem, acesse a home e verifique após o deploy', 'info')

  out('<br><div class="ok">✅ Diagnóstico concluído</div>')
}

diagnostico()
</script>
</body>
</html>
